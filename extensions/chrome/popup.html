<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a2e;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status.connected {
      background: #1b3a2a;
      color: #4CAF50;
      border: 1px solid #2d5a3e;
    }
    .status.disconnected {
      background: #3a1b1b;
      color: #f44336;
      border: 1px solid #5a2d2d;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.attach {
      background: #4CAF50;
      color: white;
    }
    button.attach:hover {
      background: #45a049;
    }
    button.detach {
      background: #f44336;
      color: white;
    }
    button.detach:hover {
      background: #da190b;
    }
    button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .tab-info {
      margin-top: 8px;
      padding: 8px;
      background: #16213e;
      border-radius: 4px;
      font-size: 11px;
      word-break: break-all;
      color: #888;
    }
  </style>
</head>
<body>
  <h3>⚡ OpenCode Relay</h3>
  <div id="status" class="status disconnected">Checking...</div>
  <button id="toggleBtn" disabled>Loading...</button>
  <div id="tabInfo" class="tab-info" style="display:none"></div>

  <script src="popup.js"></script>
</body>
</html>
