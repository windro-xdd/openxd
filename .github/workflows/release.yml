name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      skip: ${{ steps.v.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(jq -r '.version' packages/opencode/package.json)
          echo "version=$version" >> $GITHUB_OUTPUT
          if gh release view "v$version" --repo ${{ github.repository }} &>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "v$version already released, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "New version v$version — building"
          fi

  build:
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install deps
        run: bun install

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.check.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "v${{ needs.check.outputs.version }}" \
            --generate-notes

      - name: Build all platforms and upload
        run: bun run ./packages/opencode/script/build.ts
        env:
          OPENCODE_RELEASE: "1"
          OPENCODE_VERSION: ${{ needs.check.outputs.version }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
