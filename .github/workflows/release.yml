name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Get version from package.json
          version=$(jq -r '.version' packages/opencode/package.json)
          echo "version=$version" >> $GITHUB_OUTPUT

          # Check if this version tag already exists
          if gh release view "v$version" --repo ${{ github.repository }} &>/dev/null; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Release v$version already exists, skipping"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "New version v$version detected, building release"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            archive: tar.gz
          - os: ubuntu-latest
            target: linux-x64-baseline
            archive: tar.gz
            baseline: true
          - os: ubuntu-24.04-arm
            target: linux-arm64
            archive: tar.gz
          - os: macos-latest
            target: darwin-arm64
            archive: zip
          - os: macos-latest
            target: darwin-x64
            archive: zip
            x64: true
          - os: macos-latest
            target: darwin-x64-baseline
            archive: zip
            x64: true
            baseline: true
          - os: windows-latest
            target: windows-x64
            archive: zip
          - os: windows-latest
            target: windows-x64-baseline
            archive: zip
            baseline: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install

      - name: Build
        run: bun run ./packages/opencode/script/build.ts --single ${{ matrix.baseline && '--baseline' || '' }}
        env:
          OPENCODE_VERSION: ${{ needs.check.outputs.version }}

      - name: Rename and package (unix)
        if: runner.os != 'Windows'
        run: |
          cd packages/opencode/dist/*/bin
          mv opencode openxd
          chmod +x openxd
          if [[ "${{ matrix.archive }}" == "tar.gz" ]]; then
            tar -czf /tmp/openxd-${{ matrix.target }}.tar.gz openxd
          else
            zip /tmp/openxd-${{ matrix.target }}.zip openxd
          fi

      - name: Rename and package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Path packages/opencode/dist/*/bin/opencode.exe -Recurse | Select-Object -First 1
          $dir = $bin.DirectoryName
          Rename-Item -Path $bin.FullName -NewName "openxd.exe"
          Compress-Archive -Path "$dir/openxd.exe" -DestinationPath "$env:TEMP/openxd-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openxd-${{ matrix.target }}
          path: |
            /tmp/openxd-${{ matrix.target }}.*
            ${{ runner.temp }}/openxd-${{ matrix.target }}.*

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -lh assets/
          gh release create "v${{ needs.check.outputs.version }}" assets/* \
            --repo ${{ github.repository }} \
            --title "v${{ needs.check.outputs.version }}" \
            --generate-notes
