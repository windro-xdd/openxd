name: Release OpenXD
run-name: "Release OpenXD ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build all OpenXD binaries
        run: |
          cd packages/opencode
          export OPENCODE_VERSION="${GITHUB_REF_NAME#v}"
          bun run script/build.ts --skip-install
        env:
          OPENCODE_RELEASE: ""

      - name: Normalize version
        run: |
          echo "VER=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Package binaries
        run: |
          cd packages/opencode/dist

          for dir in opencode-*; do
            if [ -d "$dir" ]; then
              base=$(echo "$dir" | sed "s/^opencode/openxd/" | sed "s/-${VER}$//")
              
              if [[ "$dir" == *"windows"* ]]; then
                (cd "$dir/bin" && zip -r "../../${base}.zip" .)
              else
                tar -czf "${base}.tar.gz" -C "$dir/bin" .
              fi
            fi
          done

          ls -lh openxd-*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: packages/opencode/dist/openxd-*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
